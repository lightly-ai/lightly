default_install_hook_types: [pre-commit, pre-push] # install both git hooks (mypy runs on pre-push)
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: detect-private-key      # check for private keys
  - id: check-added-large-files # prevent commit of files >500kB
    args: ['--maxkb=500']
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.12.7
  hooks:
    - id: ruff-check
      args: [--fix]
    - id: ruff-format
- repo: local
  hooks:
  - id: mypy
    name: mypy
    entry: mypy
    language: system
    types: [python]
    pass_filenames: false
    stages: [pre-push] # a full mypy run is too slow for every commit
    args: [lightly, tests]
